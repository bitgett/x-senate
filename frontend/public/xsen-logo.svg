<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Subtle inner radial glow -->
  <radialGradient id="innerGlow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <circle cx="100" cy="100" r="100" fill="url(#innerGlow)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!-- X bars with glow -->
  <g filter="url(#glow)" clip-path="url(#circle-clip)">
    <line x1="38" y1="38" x2="162" y2="162" stroke="url(#xGrad)" stroke-width="26" stroke-linecap="round"/>
    <line x1="162" y1="38" x2="38" y2="162" stroke="url(#xGrad)" stroke-width="26" stroke-linecap="round"/>
  </g>

  <!-- Center dot accent -->
  <circle cx="100" cy="100" r="8" fill="#e879f9" opacity="0.9"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff" opacity="0.7"/>

  <!-- XSEN label -->
  <text
    x="100" y="182"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="900"
    fill="rgba(216,180,254,0.55)"
    letter-spacing="5"
  >XSEN</text>
</svg>
