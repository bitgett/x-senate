<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Teal circle background -->
  <circle cx="100" cy="100" r="100" fill="#1DC9A4"/>

  <!-- White outer hexagon (pointy-top) -->
  <polygon
    points="100,32 158,66 158,134 100,168 42,134 42,66"
    fill="white"
  />

  <!-- Teal inner hexagon — creates hollow ring effect -->
  <polygon
    points="100,58 136,79 136,121 100,142 64,121 64,79"
    fill="#1DC9A4"
  />
</svg>
